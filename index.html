<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="top-header">
    <h1>TaskFlow</h1>
  </header>

  <main class="page">
    <aside class="legend">
      <h2 class="legend-title">Importancia</h2>

      <div class="legend-item">
        <span class="dot high"></span>
        <span>Importancia alta</span>
      </div>

      <div class="legend-item">
        <span class="dot medium"></span>
        <span>Importancia media</span>
      </div>

      <div class="legend-item">
        <span class="dot low"></span>
        <span>Importancia baja</span>
      </div>
    </aside>

    <section class="content">
      <h2>Lista de tareas</h2>

      <form id="task-form" class="task-form">
        <input id="task-input" type="text" placeholder="Nueva tarea..." required />

        <select id="task-priority" aria-label="Prioridad">
          <option value="high">Alta</option>
          <option value="medium" selected>Media</option>
          <option value="low">Baja</option>
        </select>

        <button type="submit">Añadir</button>
      </form>

      <input id="task-search" class="task-search" type="text" placeholder="Buscar tarea..." />

      <div id="task-list" class="task-list"></div>
    </section>
  </main>
</body>
</html>
<script src="app.js"></script>
