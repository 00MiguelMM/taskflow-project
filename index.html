<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="top-header">
    <h1>TaskFlow</h1>
  </header>

  <main class="page">
    <aside class="legend">
      <h2 class="legend-title">Importancia</h2>

      <div class="legend-item">
        <span class="dot high"></span>
        <span>Importancia alta</span>
      </div>

      <div class="legend-item">
        <span class="dot medium"></span>
        <span>Importancia media</span>
      </div>

      <div class="legend-item">
        <span class="dot low"></span>
        <span>Importancia baja</span>
      </div>
    </aside>

    <section class="content">
      <h2>Lista de tareas</h2>

      <div class="task-list">
        <article class="task-card">
          <h3>Reunión clientes</h3>
          <div class="task-meta">
            <span class="tag priority high">Alta</span>
          </div>
        </article>

        <article class="task-card">
          <h3>Llamar nuevo cliente</h3>
          <div class="task-meta">
            <span class="tag priority medium">Media</span>
          </div>
        </article>

        <article class="task-card">
          <h3>Cancelar hora peluquería</h3>
          <div class="task-meta">
            <span class="tag priority low">Baja</span>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
